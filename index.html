<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>mmcode.panel | Zarządzanie Ticketami</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7d5fff; --bg: #0b0518; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        .card { background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-save { background: var(--primary); width: 100%; margin-top: 15px; }
        .btn-add { background: #2ecc71; margin-bottom: 15px; }
        .btn-del { background: #e74c3c; padding: 5px 10px; font-size: 12px; }
        .option-box { border: 1px solid var(--primary); padding: 15px; border-radius: 10px; margin-top: 15px; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>mmcode<span>.panel</span></h1>
        
        <div id="login-box" class="card">
            <button class="btn btn-save" onclick="login()">ZALOGUJ PRZEZ DISCORD</button>
        </div>

        <div id="panel" style="display:none;">
            <div class="card">
                <h3>Twoje aktywne komendy na serwerze:</h3>
                <div id="cmd-list"></div>
            </div>

            <div class="card">
                <h2>Konfigurator Komendy</h2>
                <input type="text" id="cmdName" placeholder="Nazwa komendy (np. pomoc)">
                <input type="text" id="mainTitle" placeholder="Tytuł głównego Embeda">
                <textarea id="mainDesc" placeholder="Opis głównego Embeda"></textarea>
                <input type="text" id="mainImg" placeholder="URL dużego zdjęcia w głównym Embedzie (opcjonalnie)">
                
                <div id="options-container"></div>
                <button class="btn btn-add" onclick="addOption()">+ DODAJ OPCJĘ TICKETA</button>
                <button class="btn btn-save" onclick="saveConfig()">ZAPISZ I AKTYWUJ KOMENDĘ</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1496484669573566564";
        const REDIRECT_URI = "http://bot.mmcode.online";
        const API = "http://152.53.179.161:7023/api";
        let curToken = "";
        let curGuild = "";

        function login() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20guilds`;
        }

        window.onload = async () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            curToken = params.get('access_token');
            if(curToken) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                loadGuilds();
            }
        };

        async function loadGuilds() {
            const res = await fetch('https://discord.com/api/users/@me/guilds', { headers: { Authorization: `Bearer ${curToken}` } });
            const guilds = await res.json();
            curGuild = guilds.find(g => (g.permissions & 0x8) === 0x8).id;
            refreshCmds();
        }

        async function refreshCmds() {
            const res = await fetch(`${API}/list/${curGuild}`);
            const data = await res.json();
            const div = document.getElementById('cmd-list');
            div.innerHTML = data.map(c => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:rgba(0,0,0,0.2); padding:10px; border-radius:5px;">
                    <span>/${c.cmd}</span>
                    <button class="btn btn-del" onclick="deleteCmd('${c.cmd}')">USUŃ</button>
                </div>
            `).join('');
        }

        function addOption() {
            const id = Date.now();
            const html = `
                <div class="option-box" id="${id}">
                    <div class="grid">
                        <input type="text" class="o-label" placeholder="Nazwa w menu (np. Pomoc Techniczna)">
                        <input type="text" class="o-role" placeholder="ID Roli do pingowania/widzenia">
                        <input type="text" class="o-cat" placeholder="ID Kategorii kanału">
                        <input type="text" class="o-title" placeholder="Tytuł wewnątrz ticketa">
                    </div>
                    <textarea class="o-desc" placeholder="Opis wewnątrz ticketa"></textarea>
                    <div class="grid">
                        <input type="text" class="o-thumb" placeholder="URL małej ikony (Thumbnail)">
                        <input type="text" class="o-img" placeholder="URL dużego zdjęcia (Szeroki embed)">
                    </div>
                    <button class="btn btn-del" onclick="document.getElementById('${id}').remove()">USUŃ TĘ OPCJĘ</button>
                </div>`;
            document.getElementById('options-container').insertAdjacentHTML('beforeend', html);
        }

        async function saveConfig() {
            const options = [];
            document.querySelectorAll('.option-box').forEach(b => {
                options.push({
                    label: b.querySelector('.o-label').value,
                    role_id: b.querySelector('.o-role').value,
                    category_id: b.querySelector('.o-cat').value,
                    ticket_title: b.querySelector('.o-title').value,
                    ticket_desc: b.querySelector('.o-desc').value,
                    thumbnail: b.querySelector('.o-thumb').value,
                    image: b.querySelector('.o-img').value
                });
            });

            const data = {
                guild_id: curGuild,
                cmd: document.getElementById('cmdName').value,
                main_title: document.getElementById('mainTitle').value,
                main_desc: document.getElementById('mainDesc').value,
                main_image: document.getElementById('mainImg').value,
                options: options
            };

            await fetch(`${API}/save`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert("Zapisano!");
            refreshCmds();
        }

        async function deleteCmd(cmd) {
            await fetch(`${API}/delete`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({guild_id: curGuild, cmd: cmd})
            });
            refreshCmds();
        }
    </script>
</body>
</html>
