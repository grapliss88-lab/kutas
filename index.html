<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mmcode | Advanced Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7d5fff; --bg: #0b0518; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: radial-gradient(circle at 50% 50%, #1e123a 0%, #0b0518 100%); }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .container { width: 95%; max-width: 900px; z-index: 10; padding: 40px 0; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; color: white; }
        .btn-discord { background: #5865F2; width: 100%; }
        .btn-primary { background: var(--primary); width: 100%; margin-top: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 10px; color: white; box-sizing: border-box; }
        
        .option-box { background: rgba(255,255,255,0.03); border: 1px dashed var(--primary); padding: 15px; border-radius: 15px; margin-top: 10px; position: relative; }
        .remove-opt { position: absolute; top: 10px; right: 10px; color: #ff4d4d; cursor: pointer; font-size: 0.8rem; }
        .embed-preview { border-left: 4px solid var(--primary); background: #2f3136; padding: 15px; border-radius: 4px; margin: 10px 0; }
        .server-item { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <div id="login-section" class="card" style="text-align: center;">
            <h1>mmcode<span>.panel</span></h1>
            <button class="btn btn-discord" onclick="loginDiscord()">ZALOGUJ PRZEZ DISCORD</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="card"><h3>Twoje Serwery</h3><div id="serverList"></div></div>

            <div id="editor" class="card" style="display:none;">
                <h2 id="targetServer" style="color:var(--primary)">Konfiguracja</h2>
                <input type="text" id="cmdName" placeholder="Nazwa komendy (np. pomoc)">
                
                <div class="embed-preview">
                    <p style="font-size: 0.8rem; opacity: 0.6; margin: 0;">GŁÓWNA WIADOMOŚĆ (Z LISTĄ WYBORU)</p>
                    <input type="text" id="mainTitle" placeholder="Tytuł główny">
                    <textarea id="mainDesc" placeholder="Opis główny..."></textarea>
                </div>

                <div id="optionsContainer">
                    <h4>Opcje w rozwijanej liście:</h4>
                </div>
                <button class="btn" style="background: #2ecc71; width: 100%;" onclick="addOption()">+ DODAJ OPCJĘ DO LISTY</button>

                <button class="btn btn-primary" onclick="saveConfig()">WYŚLIJ KONFIGURACJĘ DO BOTA</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1496484669573566564"; 
        const REDIRECT_URI = "https://grapliss88-lab.github.io/kutas/";
        const BOT_API = "http://152.53.179.161:7023/api";

        function loginDiscord() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20guilds&prompt=login`;
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get('access_token');
            if (token) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchGuilds(token);
            }
        };

        async function fetchGuilds(token) {
            const res = await fetch('https://discord.com/api/users/@me/guilds', { headers: { Authorization: `Bearer ${token}` } });
            const guilds = await res.json();
            const list = document.getElementById('serverList');
            guilds.filter(g => (g.permissions & 0x8) === 0x8).forEach(g => {
                list.innerHTML += `<div class="server-item"><span>${g.name}</span><button class="btn" style="background:var(--primary)" onclick="openEditor('${g.id}', '${g.name}')">ZARZĄDZAJ</button></div>`;
            });
        }

        let optionsCount = 0;
        function addOption() {
            optionsCount++;
            const id = `opt_${optionsCount}`;
            const html = `
                <div class="option-box" id="${id}">
                    <span class="remove-opt" onclick="document.getElementById('${id}').remove()">USUŃ X</span>
                    <input type="text" class="opt-label" placeholder="Nazwa opcji (np. Kupno rangi)">
                    <div class="embed-preview" style="border-color: #2ecc71">
                        <p style="font-size: 0.7rem; opacity: 0.6;">EMBED PO OTWARCIU TICKETA</p>
                        <input type="text" class="opt-title" placeholder="Tytuł w tickecie">
                        <textarea class="opt-desc" placeholder="Treść w tickecie..."></textarea>
                    </div>
                </div>`;
            document.getElementById('optionsContainer').insertAdjacentHTML('beforeend', html);
        }

        let currentGuild = "";
        function openEditor(id, name) {
            currentGuild = id;
            document.getElementById('targetServer').innerText = name;
            document.getElementById('editor').style.display = 'block';
        }

        async function saveConfig() {
            const options = [];
            document.querySelectorAll('.option-box').forEach(box => {
                options.append({
                    label: box.querySelector('.opt-label').value,
                    ticket_title: box.querySelector('.opt-title').value,
                    ticket_desc: box.querySelector('.opt-desc').value
                });
            });

            const data = {
                guild_id: currentGuild,
                cmd: document.getElementById('cmdName').value,
                main_title: document.getElementById('mainTitle').value,
                main_desc: document.getElementById('mainDesc').value,
                options: options
            };

            try {
                const res = await fetch(`${BOT_API}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(res.ok) alert("✅ Wysłano do bota!");
            } catch(e) { alert("❌ Błąd połączenia z IP 152.53.179.161:7023"); }
        }
    </script>
</body>
</html>
