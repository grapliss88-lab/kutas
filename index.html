<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>bot.mmcode.online | Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7d5fff; --bg: #0b0518; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        .card { background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.3s; }
        .btn-primary { background: var(--primary); }
        .btn-add { background: #2ecc71; }
        .btn-danger { background: #e74c3c; }
        .server-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; color: white; }
        .option-box { border-left: 3px solid var(--primary); padding-left: 15px; margin-top: 15px; background: rgba(255,255,255,0.02); padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>bot.mmcode<span>.online</span></h1>

        <div id="login-box" class="card">
            <button class="btn btn-primary" onclick="login()">ZALOGUJ PRZEZ DISCORD</button>
        </div>

        <div id="guild-selector" class="card" style="display:none;">
            <h3>Wybierz Serwer:</h3>
            <div id="guild-list"></div>
        </div>

        <div id="editor" style="display:none;">
            <button class="btn btn-danger" onclick="location.reload()"> POWRÓT DO LISTY</button>
            <div class="card">
                <h3>Aktywne komendy na tym serwerze:</h3>
                <div id="cmd-list"></div>
            </div>

            <div class="card">
                <h2 id="edit-title">Nowa Komenda</h2>
                <input type="text" id="cmdName" placeholder="Nazwa komendy (np. ticket)">
                <input type="text" id="mainTitle" placeholder="Tytuł embeda">
                <textarea id="mainDesc" placeholder="Opis embeda..."></textarea>
                <input type="text" id="mainImage" placeholder="URL dużego zdjęcia">
                
                <div id="options-container"></div>
                <button class="btn btn-add" onclick="addOption()">+ DODAJ OPCJĘ</button>
                <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="saveConfig()">ZAPISZ</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1496484669573566564";
        const REDIRECT_URI = "http://bot.mmcode.online";
        const API = "http://152.53.179.161:7023/api";
        let token, curGuild, allCmds = [];

        function login() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20guilds`;
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            token = params.get('access_token');
            if(token) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('guild-selector').style.display = 'block';
                loadGuilds();
            }
        };

        async function loadGuilds() {
            const res = await fetch('https://discord.com/api/users/@me/guilds', { headers: { Authorization: `Bearer ${token}` } });
            const guilds = await res.json();
            const list = document.getElementById('guild-list');
    
            // Link do zaproszenia bota (wstaw swoje CLIENT_ID)
            const inviteUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&permissions=8&scope=bot%20applications.commands`;

            list.innerHTML = guilds.filter(g => (g.permissions & 0x8) === 0x8).map(g => `
                <div class="server-item">
                    <span>${g.name}</span>
                    <div>
                        <a href="${inviteUrl}&guild_id=${g.id}" target="_blank" class="btn btn-add" style="text-decoration:none; font-size:12px;">+ DODAJ BOTA</a>
                        <button class="btn btn-primary" onclick="selectGuild('${g.id}')">ZARZĄDZAJ</button>
                    </div>
                </div>
            `).join('');
        }

        async function selectGuild(id) {
            curGuild = id;
            document.getElementById('guild-selector').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            refreshCmds();
        }

        async function refreshCmds() {
            const res = await fetch(`${API}/list/${curGuild}`);
            allCmds = await res.json();
            const list = document.getElementById('cmd-list');
            list.innerHTML = allCmds.length ? allCmds.map(c => `
                <div class="server-item">
                    <span>/${c.cmd}</span>
                    <div>
                        <button class="btn btn-add" style="padding:5px" onclick="editCmd('${c.cmd}')">EDYTUJ</button>
                        <button class="btn btn-danger" style="padding:5px" onclick="deleteCmd('${c.cmd}')">USUŃ</button>
                    </div>
                </div>
            `).join('') : "Brak komend. Stwórz pierwszą!";
        }

        function addOption(d = {}) {
            const id = Date.now() + Math.random();
            document.getElementById('options-container').insertAdjacentHTML('beforeend', `
                <div class="option-box" id="${id}">
                    <input type="text" class="o-label" placeholder="Nazwa w menu" value="${d.label||''}">
                    <input type="text" class="o-cat" placeholder="ID Kategorii" value="${d.category_id||''}">
                    <input type="text" class="o-role" placeholder="ID Roli" value="${d.role_id||''}">
                    <input type="text" class="o-title" placeholder="Tytuł w tickecie" value="${d.ticket_title||''}">
                    <textarea class="o-desc" placeholder="Opis w tickecie">${d.ticket_desc||''}</textarea>
                    <input type="text" class="o-thumb" placeholder="Miniaturka URL" value="${d.thumbnail||''}">
                    <input type="text" class="o-img" placeholder="Duże zdjęcie URL" value="${d.image||''}">
                    <button class="btn btn-danger" style="width:100%" onclick="document.getElementById('${id}').remove()">USUŃ TĘ OPCJĘ</button>
                </div>
            `);
        }

        function editCmd(name) {
            const c = allCmds.find(x => x.cmd === name);
            document.getElementById('cmdName').value = c.cmd;
            document.getElementById('mainTitle').value = c.main_title;
            document.getElementById('mainDesc').value = c.main_desc;
            document.getElementById('mainImage').value = c.main_image || '';
            document.getElementById('options-container').innerHTML = '';
            c.options.forEach(o => addOption(o));
            document.getElementById('edit-title').innerText = "Edytujesz: /" + name;
        }

        async function saveConfig() {
            const options = [];
            document.querySelectorAll('.option-box').forEach(b => {
                options.push({
                    label: b.querySelector('.o-label').value,
                    category_id: b.querySelector('.o-cat').value,
                    role_id: b.querySelector('.o-role').value,
                    ticket_title: b.querySelector('.o-title').value,
                    ticket_desc: b.querySelector('.o-desc').value,
                    thumbnail: b.querySelector('.o-thumb').value,
                    image: b.querySelector('.o-img').value
                });
            });
            const data = {
                guild_id: curGuild,
                cmd: document.getElementById('cmdName').value,
                main_title: document.getElementById('mainTitle').value,
                main_desc: document.getElementById('mainDesc').value,
                main_image: document.getElementById('mainImage').value,
                options: options
            };
            await fetch(`${API}/save`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Zapisano!");
            refreshCmds();
        }

        async function deleteCmd(cmd) {
            if(!confirm("Usunąć?")) return;
            await fetch(`${API}/delete`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({guild_id: curGuild, cmd: cmd}) });
            refreshCmds();
        }
    </script>
</body>
</html>
