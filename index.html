<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>bot.mmcode.online | Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7d5fff; --bg: #05020a; }
        body, html { margin:0; padding:0; height:100%; background: var(--bg); color:white; font-family:'Poppins', sans-serif; overflow-x:hidden; }
        #canvas { position:fixed; top:0; left:0; z-index:-1; }

        .wrapper { display:flex; flex-direction:column; align-items:center; padding:40px; z-index:1; position:relative; }
        .back-home { background:rgba(255,255,255,0.1); padding:10px 20px; border-radius:50px; text-decoration:none; color:white; font-size:14px; margin-bottom:30px; transition:0.3s; }
        .back-home:hover { background: var(--primary); }

        .card { background:rgba(255,255,255,0.03); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:30px; width:100%; max-width:800px; margin-bottom:20px; }
        
        .btn-main { background: var(--primary); border:none; color:white; padding:15px 40px; border-radius:50px; font-weight:600; cursor:pointer; font-size:18px; transition:0.3s; }
        .btn-main:hover { transform:scale(1.05); box-shadow:0 0 20px var(--primary); }

        .cmd-item { background:rgba(0,0,0,0.3); padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.05); }
        .btn-red { background:#e74c3c; padding:5px 10px; border:none; color:white; border-radius:5px; cursor:pointer; }
        .btn-yellow { background:#f1c40f; padding:5px 10px; border:none; color:black; border-radius:5px; cursor:pointer; margin-right:10px; }

        input, textarea { width:100%; padding:12px; margin:8px 0; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:white; box-sizing:border-box; }
        .opt-box { border-left:4px solid var(--primary); padding:15px; background:rgba(255,255,255,0.02); margin-top:15px; position:relative; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="wrapper">
        <a href="https://www.mmcode.online" class="back-home">← POWRÓT DO STRONY GŁÓWNEJ</a>
        
        <div id="login-box">
            <h1 style="font-size:3rem;">bot.mmcode<span>.online</span></h1>
            <button class="btn-main" onclick="login()">ZALOGUJ SIĘ PRZEZ DISCORD</button>
        </div>

        <div id="panel" style="display:none; width:100%; max-width:900px;">
            <div class="card">
                <h3>Wybierz Serwer:</h3>
                <div id="guild-list"></div>
            </div>

            <div id="editor-section" style="display:none;">
                <div class="card">
                    <h3>Komendy na serwerze:</h3>
                    <div id="active-cmds"></div>
                </div>

                <div class="card">
                    <h2 id="edit-mode-text">Nowa Komenda</h2>
                    <input type="text" id="cmdName" placeholder="Nazwa komendy (np. ticket)">
                    <input type="text" id="mainTitle" placeholder="Tytuł Embeda">
                    <textarea id="mainDesc" placeholder="Opis Embeda..."></textarea>
                    <input type="text" id="mainImg" placeholder="URL dużego zdjęcia Embeda">
                    
                    <div id="options-container"></div>
                    <button class="btn-main" style="background:#2ecc71; font-size:14px; padding:10px; margin-top:10px;" onclick="addOption()">+ DODAJ OPCJĘ TICKETA</button>
                    <button class="btn-main" style="width:100%; margin-top:20px;" onclick="saveConfig()">ZAPISZ KOMENDĘ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KULECZKI ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let balls = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Ball {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.r = Math.random() * 4 + 1;
                this.vX = (Math.random() - 0.5) * 0.5;
                this.vY = (Math.random() - 0.5) * 0.5;
                this.color = `hsla(${Math.random() * 360}, 70%, 70%, ${Math.random() * 0.5})`;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                this.x += this.vX; this.y += this.vY;
                if(this.x < 0 || this.x > canvas.width) this.vX *= -1;
                if(this.y < 0 || this.y > canvas.height) this.vY *= -1;
            }
        }
        for(let i=0; i<80; i++) balls.push(new Ball());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); balls.forEach(b=>{b.update();b.draw();}); requestAnimationFrame(anim); }
        anim();

        // --- LOGIKA ---
        const CLIENT_ID = "1496484669573566564";
        const API = "http://152.53.179.161:7023/api";
        let token, curGuild, allCmds = [];

        function login() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent('http://bot.mmcode.online')}&response_type=token&scope=identify%20guilds`; }

        window.onload = () => {
            const p = new URLSearchParams(window.location.hash.slice(1));
            token = p.get('access_token');
            if(token) { document.getElementById('login-box').style.display='none'; document.getElementById('panel').style.display='block'; loadGuilds(); }
        }

        async function loadGuilds() {
            const res = await fetch('https://discord.com/api/users/@me/guilds', { 
                headers: { Authorization: `Bearer ${token}` } 
            });
            const guilds = await res.json(); 
            const MY_BOT_ID = "1496484669573566564"; 
            const inviteBase = `https://discord.com/api/oauth2/authorize?client_id=${MY_BOT_ID}&permissions=8&scope=bot%20applications.commands`;
            const list = document.getElementById('guild-list');
    
            list.innerHTML = guilds.filter(g => (g.permissions & 0x8) === 0x8).map(g => `
                <div class="cmd-item" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px;">
                    <span>${g.name}</span>
                    <div style="display: flex; gap: 10px;">
                        <a href="${inviteBase}&guild_id=${g.id}" target="_blank" class="btn-main" 
                           style="padding: 5px 15px; font-size: 12px; background: #2ecc71; text-decoration: none; display: flex; align-items: center;">
                           + DODAJ BOTA
                        </a>
                        <button class="btn-main" style="padding: 5px 15px; font-size: 12px;" 
                                onclick="selectGuild('${g.id}')">
                                ZARZĄDZAJ
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function selectGuild(id) {
            curGuild = id;
            document.getElementById('editor-section').style.display='block';
            refreshCmds();
        }

        async function refreshCmds() {
            const res = await fetch(`${API}/list/${curGuild}`);
            allCmds = await res.json();
            document.getElementById('active-cmds').innerHTML = allCmds.map(c=>`
                <div class="cmd-item">
                    <strong>/${c.cmd}</strong>
                    <div>
                        <button class="btn-yellow" onclick="editCmd('${c.cmd}')">EDYTUJ</button>
                        <button class="btn-red" onclick="deleteCmd('${c.cmd}')">USUŃ</button>
                    </div>
                </div>
            `).join('');
        }

        function addOption(d={}) {
            const id = Date.now();
            document.getElementById('options-container').insertAdjacentHTML('beforeend', `
                <div class="opt-box" id="${id}">
                    <div class="grid">
                        <input type="text" class="o-label" placeholder="Nazwa opcji" value="${d.label||''}">
                        <input type="text" class="o-role" placeholder="ID Roli" value="${d.role_id||''}">
                        <input type="text" class="o-cat" placeholder="ID Kategorii" value="${d.category_id||''}">
                        <input type="text" class="o-title" placeholder="Tytuł w tickecie" value="${d.ticket_title||''}">
                    </div>
                    <textarea class="o-desc" placeholder="Opis w tickecie">${d.ticket_desc||''}</textarea>
                    <input type="text" class="o-img" placeholder="URL zdjęcia w tickecie" value="${d.image||''}">
                    <button class="btn-red" style="width:100%" onclick="document.getElementById('${id}').remove()">USUŃ OPCJĘ</button>
                </div>
            `);
        }

        function editCmd(name) {
            const c = allCmds.find(x=>x.cmd===name);
            document.getElementById('cmdName').value = c.cmd;
            document.getElementById('mainTitle').value = c.main_title;
            document.getElementById('mainDesc').value = c.main_desc;
            document.getElementById('mainImg').value = c.main_image || '';
            document.getElementById('options-container').innerHTML = '';
            c.options.forEach(o=>addOption(o));
            document.getElementById('edit-mode-text').innerText = "Edytujesz: /" + name;
        }

        async function saveConfig() {
            const opts = [];
            document.querySelectorAll('.opt-box').forEach(b => {
                opts.push({
                    label: b.querySelector('.o-label').value,
                    role_id: b.querySelector('.o-role').value,
                    category_id: b.querySelector('.o-cat').value,
                    ticket_title: b.querySelector('.o-title').value,
                    ticket_desc: b.querySelector('.o-desc').value,
                    image: b.querySelector('.o-img').value
                });
            });
            const data = {
                guild_id: curGuild,
                cmd: document.getElementById('cmdName').value,
                main_title: document.getElementById('mainTitle').value,
                main_desc: document.getElementById('mainDesc').value,
                main_image: document.getElementById('mainImg').value,
                options: opts
            };
            await fetch(`${API}/save`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            alert("Zapisano!");
            refreshCmds();
        }

        async function deleteCmd(cmd) {
            await fetch(`${API}/delete`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({guild_id:curGuild, cmd:cmd})});
            refreshCmds();
        }
    </script>
</body>
</html>
