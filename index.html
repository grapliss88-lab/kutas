<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mmcode | Bot Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7d5fff; --bg: #0b0518; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: radial-gradient(circle at 50% 50%, #1e123a 0%, #0b0518 100%); }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .dot { position: absolute; background: white; border-radius: 50%; opacity: 0.2; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.4; } }

        .container { width: 90%; max-width: 800px; z-index: 10; padding: 40px 0; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        .header span { color: var(--primary); }

        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; margin-bottom: 20px; }
        
        .btn { padding: 15px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; text-transform: uppercase; color: white; }
        .btn-discord { background: #5865F2; width: 100%; font-size: 1.1rem; }
        .btn-primary { background: var(--primary); width: 100%; margin-top: 20px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        #dashboard { display: none; }
        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .server-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* Edytor Embed */
        .embed-preview { border-left: 4px solid var(--primary); background: #2f3136; padding: 20px; border-radius: 4px; text-align: left; margin-top: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 10px; color: white; font-family: inherit; box-sizing: border-box; }
        
        .command-list { margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px; }
        .cmd-item { display: flex; justify-content: space-between; background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.3); padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; }
        .del-btn { color: #ff4d4d; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <div class="header"><h1>mmcode<span>.panel</span></h1></div>

        <div id="login-section" class="card">
            <p style="text-align: center; opacity: 0.7;">Zaloguj się, aby zarządzać swoimi botami na serwerach.</p>
            <button class="btn btn-discord" onclick="loginDiscord()">ZALOGUJ PRZEZ DISCORD</button>
        </div>

        <div id="dashboard">
            <div class="card">
                <h3 id="userName">Witaj!</h3>
                <div id="serverList" class="server-grid"></div>
            </div>

            <div id="editor" class="card" style="display:none;">
                <h2 id="targetServer">Konfiguracja</h2>
                <input type="text" id="cmdName" placeholder="Nazwa komendy (np. ticket)">
                
                <div class="embed-preview">
                    <input type="text" id="embTitle" placeholder="Tytuł Embeda (np. Pomoc)" style="font-weight: bold; font-size: 1.2rem; background: transparent; border: none; border-bottom: 1px solid #444;">
                    <textarea id="embDesc" rows="4" placeholder="Treść wiadomości..." style="background: transparent; border: none;"></textarea>
                    <input type="text" id="embImg" placeholder="Link do obrazka (opcjonalnie)">
                </div>

                <div style="margin-top: 15px; display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="addTicket" style="width: auto;"> <span>Dodaj przycisk Ticketa?</span>
                </div>

                <button class="btn btn-primary" onclick="saveConfig()">ZAPISZ I AKTYWUJ</button>
                
                <div class="command-list" id="activeCmds">
                    <h4>Aktywne komendy na tym serwerze:</h4>
                    <div id="cmdsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1496484669573566564";
        const REDIRECT_URI = "https://grapliss88-lab.github.io/kutas/";
        const BOT_API = "http://node.zytrano.top:7023"; // Upewnij się że port jest otwarty!

        function loginDiscord() {
            // Czyścimy stary token, żeby wymusić logowanie za każdym razem
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20guilds&prompt=login`;
            window.location.href = url;
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get('access_token');
            if (token) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData(token);
            }
        };

        async function loadData(token) {
            const userReq = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
            const user = await userReq.json();
            document.getElementById('userName').innerText = `Witaj, ${user.username}!`;

            const guildsReq = await fetch('https://discord.com/api/users/@me/guilds', { headers: { Authorization: `Bearer ${token}` } });
            const guilds = await guildsReq.json();
            const adminGuilds = guilds.filter(g => (g.permissions & 0x8) === 0x8);

            const list = document.getElementById('serverList');
            adminGuilds.forEach(g => {
                const d = document.createElement('div');
                d.className = 'server-item';
                d.innerHTML = `<span>${g.name}</span><button class="btn" style="background:var(--primary); padding:5px 10px;" onclick="openEditor('${g.id}', '${g.name}')">EDYTUJ</button>`;
                list.appendChild(d);
            });
        }

        let currentGuild = "";

        async function openEditor(id, name) {
            currentGuild = id;
            document.getElementById('targetServer').innerText = `Serwer: ${name}`;
            document.getElementById('editor').style.display = 'block';
            loadCommands();
        }

        async function loadCommands() {
            try {
                const r = await fetch(`${BOT_API}/get/${currentGuild}`);
                const data = await r.json();
                const cont = document.getElementById('cmdsContainer');
                cont.innerHTML = "";
                data.forEach(c => {
                    cont.innerHTML += `<div class="cmd-item"><span>/${c.cmd}</span><span class="del-btn" onclick="deleteCmd('${c.cmd}')">USUŃ</span></div>`;
                });
            } catch(e) { console.log("Błąd pobierania"); }
        }

        async function saveConfig() {
            const data = {
                guild_id: currentGuild,
                cmd: document.getElementById('cmdName').value,
                title: document.getElementById('embTitle').value,
                desc: document.getElementById('embDesc').value,
                img: document.getElementById('embImg').value,
                ticket: document.getElementById('addTicket').checked
            };

            const res = await fetch(`${BOT_API}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(res.ok) { alert("Zapisano!"); loadCommands(); }
            else { alert("Błąd połączenia z botem!"); }
        }

        async function deleteCmd(cmd) {
            await fetch(`${BOT_API}/delete/${currentGuild}/${cmd}`, { method: 'DELETE' });
            loadCommands();
        }

        // Particles
        const p = document.getElementById('particles-js');
        for(let i=0; i<30; i++) {
            const d = document.createElement('div'); d.className = 'dot';
            d.style.left = Math.random()*100+'%'; d.style.top = Math.random()*100+'%';
            const s = Math.random()*3+'px'; d.style.width = s; d.style.height = s;
            d.style.setProperty('--duration', Math.random()*3+2+'s');
            p.appendChild(d);
        }
    </script>
</body>
</html>
